<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>勉強管理アプリ</title>
</head>
<body>
    <div class="container mt-4">
    <h1>勉強管理アプリ</h1>

    <form  method ="POST">
        <div class="col-md-3">
            <input type="text" name="subject" class="form-control" placeholder="科目">
        </div>
        <div class="col-md-3">
            <input type="text" name="content" class="form-control" placeholder="内容">
        </div>
        <div class="col-md-3">
             <input type="number" step="0.1" name="hours" class="form-control" placeholder="勉強時間" required>
        </div>
        <button type="submit">追加</button>
        <a href="/logout" role="button">ログアウト</a>
        <a href="/graph" class="btn btn-success mt-3">グラフを見る</a>
        

         
    </form>

    <ul>
        {%for study in studies%}
            <li>{{ study.subject }} : {{ study.content }} {{study.hours}}</li>
             <a href="/{{ study.id }}/update">編集</a>
             <a href="/{{ study.id }}/delete">削除</a>
        {% endfor %}
    </ul>
 
    
</body>
</html>
